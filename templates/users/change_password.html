{% set active_page = 'users' %}
{% extends 'base.html' %}
{% block title %}تغيير كلمة المرور{% endblock %}
{% block content %}
<div class="user-form-shell">
  <div class="user-form-card">
    <div class="page-title mb-4">
      <div>
        <h2 class="mb-1">تغيير كلمة المرور</h2>
        <p class="text-muted mb-0">تغيير كلمة المرور للمستخدم {{ user.username }}</p>
      </div>
    </div>
    <form method="post" class="form-grid">
      {% if session.get('user_id') == user.id %}
      <div class="form-group full">
        <label>كلمة المرور الحالية</label>
        <input type="password" class="form-control" name="current_password" required>
      </div>
      {% endif %}
      <div class="form-group full">
        <label>كلمة المرور الجديدة</label>
        <input type="password" class="form-control" name="password" required minlength="6">
      </div>
      <div class="form-group full">
        <label>تأكيد كلمة المرور الجديدة</label>
        <input type="password" class="form-control" name="password_confirm" required minlength="6">
      </div>
      <div class="form-actions full">
        <button class="btn btn-success" type="submit">تغيير كلمة المرور</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('users.edit_user', user_id=user.id) }}">إلغاء</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
