<header class="app-topbar no-print">
  <div class="topbar-start">
    <button type="button" class="topbar-icon-button" aria-label="القائمة" data-sidebar-toggle>
      <span class="icon-menu-lines"></span>
    </button>
    <a class="topbar-brand" href="{{ url_for('dashboard.dashboard') }}">
      <span class="brand-mark">  <img src="/static/image/logo.png" alt="logo"></span>
      <span class="brand-copy">
        <strong>نظام كلية التقنية الهندسية</strong>
        <small>College Management System</small>
      </span>
    </a>
  </div>

  <div class="topbar-actions">
    <a class="topbar-avatar-btn" href="{{ url_for('users.list_users') }}">
      <span class="user-avatar" style="background:#f59e0b">{{ (session.get('label') or session.get('username') or 'S')[:1] }}</span>
      <span class="user-copy">
        <strong>{{ session.get('label') or 'General Department' }}</strong>
        <small>{{ session.get('role') or 'super_admin' }}</small>
      </span>
    </a>
  </div>
</header>
