<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>بوابة الطالب | لوحة التحكم المدمجة</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/tajawal@5.0.0/index.css" rel="stylesheet">
<style>
  body {
    font-family: 'Tajawal', sans-serif;
    background-color: #020617;
    background-image: 
      radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
    color: #f8fafc;
    height: 100vh;
    width: 100vw;
    overflow: hidden; /* Prevent page scroll */
    display: flex;
    flex-direction: column;
  }
  
  .glass {
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  
  .glass-hover:hover {
    background: rgba(51, 65, 85, 0.6);
    border-color: rgba(56, 189, 248, 0.3);
    transform: translateY(-1px);
  }

  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

  /* Compact Timetable */
  .tt-cell {
    transition: all 0.2s ease;
  }
  .tt-cell.filled {
    background: rgba(56, 189, 248, 0.15);
    border: 1px solid rgba(56, 189, 248, 0.3);
    color: #e0f2fe;
  }
  .tt-cell.filled:hover {
    background: rgba(56, 189, 248, 0.25);
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
  }
  .tt-cell.empty {
    background: rgba(15, 23, 42, 0.3);
    color: #64748b;
    border: 1px dashed rgba(100, 116, 139, 0.2);
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
    z-index: 1000; display: none; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s ease;
  }
  .modal-overlay.active { display: flex; opacity: 1; }
  .modal-content {
    background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    width: 90%; max-width: 450px; padding: 24px; transform: scale(0.95); transition: transform 0.2s ease;
  }
  .modal-overlay.active .modal-content { transform: scale(1); }

  /* Custom Select Styling */
  select {
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
    background-position: left 0.5rem center;
    background-repeat: no-repeat;
    background-size: 1.5em 1.5em;
    appearance: none;
  }
</style>
</head>
<body>

  <!-- 1. Compact Header -->
  <header class="h-14 flex items-center justify-between px-4 border-b border-white/5 bg-slate-900/50 backdrop-blur-md shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-sm font-bold shadow-lg shadow-cyan-500/20">
        <i class="fas fa-graduation-cap text-white"></i>
      </div>
      <div>
        <h1 class="text-sm font-bold text-white leading-tight">بوابة الطالب</h1>
        <p class="text-[10px] text-slate-400">أحمد محمد العلي • 202103456</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <span class="px-2 py-1 rounded bg-green-500/10 text-green-400 text-[10px] font-bold border border-green-500/20">منتظم</span>
      <div class="text-left">
        <div id="liveClock" class="text-sm font-mono font-bold text-cyan-400 leading-tight">--:--</div>
        <div id="liveDate" class="text-[10px] text-slate-500">--</div>
      </div>
    </div>
  </header>

  <!-- 2. Filter Control Bar -->
  <div class="h-12 flex items-center gap-3 px-4 border-b border-white/5 bg-slate-900/30 shrink-0">
    <div class="relative flex-1 max-w-xs">
      <i class="fas fa-building absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
      <select id="deptSelect" class="w-full bg-slate-800/80 border border-slate-700 rounded-lg py-1.5 pr-8 pl-8 text-xs text-white focus:outline-none focus:border-cyan-500 transition cursor-pointer">
        <option value="cs">علوم الحاسوب</option>
        <option value="eng">الهندسة</option>
        <option value="med">الطب</option>
        <option value="bus">إدارة الأعمال</option>
        <option value="law">القانون</option>
        <option value="art">الفنون والتصميم</option>
        <option value="sci">العلوم الطبيعية</option>
        <option value="pharm">الصيدلة</option>
        <option value="dent">طب الأسنان</option>
        <option value="nurs">التمريض</option>
        <!-- Simulating 60+ departments -->
        <option value="other">... و 50 قسم آخر</option>
      </select>
    </div>
    
    <div class="relative w-32">
      <i class="fas fa-layer-group absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
      <select id="semSelect" class="w-full bg-slate-800/80 border border-slate-700 rounded-lg py-1.5 pr-8 pl-8 text-xs text-white focus:outline-none focus:border-cyan-500 transition cursor-pointer">
        <option value="1">المستوى الأول</option>
        <option value="2">المستوى الثاني</option>
        <option value="3">المستوى الثالث</option>
        <option value="4">المستوى الرابع</option>
        <option value="5">المستوى الخامس</option>
        <option value="6" selected>المستوى السادس</option>
        <option value="7">المستوى السابع</option>
      </select>
    </div>

    <div class="flex-1"></div>
    
    <button class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 text-xs transition flex items-center gap-2">
      <i class="fas fa-sync-alt text-[10px]"></i> تحديث
    </button>
  </div>

  <!-- 3. Main Content Grid (No Scroll, Fits 100vh) -->
  <main class="flex-1 grid grid-cols-12 gap-3 p-3 min-h-0">
    
    <!-- Left: Timetable (8 cols) -->
    <section class="col-span-12 lg:col-span-8 glass rounded-xl flex flex-col min-h-0">
      <div class="flex items-center justify-between px-4 py-2 border-b border-white/5 shrink-0">
        <h2 class="text-xs font-bold text-slate-200 flex items-center gap-2">
          <i class="fas fa-calendar-week text-cyan-400"></i> الجدول الدراسي
        </h2>
        <span class="text-[10px] text-slate-500">الفصل الدراسي الأول 2024</span>
      </div>
      
      <div class="flex-1 overflow-hidden p-2">
        <table class="w-full h-full text-[11px]">
          <thead>
            <tr class="text-slate-400">
              <th class="w-16 pb-2 font-semibold">اليوم</th>
              <th class="pb-2 font-semibold">الفترة أ <span class="text-[9px] font-normal text-slate-500 block">09:00 - 11:00</span></th>
              <th class="pb-2 font-semibold">الفترة ب <span class="text-[9px] font-normal text-slate-500 block">12:00 - 02:00</span></th>
              <th class="pb-2 font-semibold">الفترة ج <span class="text-[9px] font-normal text-slate-500 block">03:00 - 05:00</span></th>
            </tr>
          </thead>
          <tbody id="timetableBody" class="align-top">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Right: Sidebar (4 cols) -->
    <aside class="col-span-12 lg:col-span-4 flex flex-col gap-3 min-h-0">
      
      <!-- Exams Panel -->
      <div class="glass rounded-xl flex flex-col flex-1 min-h-0">
        <div class="flex items-center justify-between px-3 py-2 border-b border-white/5 shrink-0">
          <h2 class="text-xs font-bold text-slate-200 flex items-center gap-2">
            <i class="fas fa-file-signature text-rose-400"></i> الاختبارات
          </h2>
        </div>
        <div class="flex-1 overflow-y-auto scrollbar-hide p-2 space-y-2" id="examList">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Downloads Panel -->
      <div class="glass rounded-xl flex flex-col flex-1 min-h-0">
        <div class="flex items-center justify-between px-3 py-2 border-b border-white/5 shrink-0">
          <h2 class="text-xs font-bold text-slate-200 flex items-center gap-2">
            <i class="fas fa-folder-open text-emerald-400"></i> المكتبة
          </h2>
          <button onclick="openLibraryModal()" class="text-[10px] text-cyan-400 hover:text-cyan-300 transition">عرض الكل</button>
        </div>
        <div class="flex-1 overflow-y-auto scrollbar-hide p-2 space-y-2" id="downloadList">
          <!-- Populated by JS -->
        </div>
      </div>

    </aside>
  </main>

  <!-- Download Modal -->
  <div class="modal-overlay" id="fileModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
      <div class="flex justify-between items-start mb-4">
        <div class="flex items-center gap-3">
          <div id="modalIcon" class="w-10 h-10 rounded-lg bg-red-500/10 text-red-400 flex items-center justify-center text-lg">
            <i class="fas fa-file-pdf"></i>
          </div>
          <div>
            <h3 class="text-sm font-bold text-white" id="modalFileName">اسم الملف</h3>
            <p class="text-[10px] text-slate-400" id="modalCourse">المقرر</p>
          </div>
        </div>
        <button onclick="closeModal()" class="w-6 h-6 rounded-full bg-slate-800 hover:bg-slate-700 flex items-center justify-center text-slate-400 transition">
          <i class="fas fa-times text-xs"></i>
        </button>
      </div>
      <div class="space-y-2 mb-4 text-[11px]">
        <div class="flex justify-between py-1.5 border-b border-slate-800">
          <span class="text-slate-500"><i class="fas fa-user-tie ml-1.5 w-3"></i> المحاضر</span>
          <span class="text-slate-300" id="modalInstructor">---</span>
        </div>
        <div class="flex justify-between py-1.5 border-b border-slate-800">
          <span class="text-slate-500"><i class="fas fa-weight-hanging ml-1.5 w-3"></i> الحجم</span>
          <span class="text-slate-300" id="modalSize">---</span>
        </div>
      </div>
      <button onclick="simulateDownload()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold py-2.5 rounded-lg transition flex items-center justify-center gap-2 shadow-lg shadow-cyan-500/20">
        <i class="fas fa-download"></i> تحميل الملف
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-4 py-2.5 rounded-xl shadow-lg shadow-emerald-500/30 flex items-center gap-2 text-xs font-bold transform translate-y-20 opacity-0 transition-all duration-300 z-50">
    <i class="fas fa-check-circle"></i> تم بدء التحميل بنجاح
  </div>

  <script>
    // --- Data ---
    const timetableData = {
      'cs': [
        { day: 'السبت', a: null, b: null, c: null },
        { day: 'الأحد', a: null, b: null, c: { subject: 'ذكاء اصطناعي', teacher: 'د. خالد وليد', room: '106', time: '03:00 - 05:00' } },
        { day: 'الاثنين', a: { subject: 'تحليل خوارزميات', teacher: 'أ. صالح', room: '301', time: '09:00 - 10:30' }, b: { subject: 'هندسة برمجيات', teacher: 'أ. نورة', room: '302', time: '12:00 - 01:30' }, c: { subject: 'نظم تشغيل', teacher: 'أ. جاسم', room: 'مختبر 3', time: '03:00 - 05:00' } },
        { day: 'الثلاثاء', a: { subject: 'تفاعل الإنسان', teacher: 'أ. مريم', room: '401', time: '09:00 - 11:00' }, b: { subject: 'قواعد بيانات', teacher: 'أ. عيسى', room: '402', time: '12:00 - 01:30' }, c: { subject: 'حوسبة سحابية', teacher: 'أ. ريم', room: '403', time: '03:00 - 04:30' } },
        { day: 'الأربعاء', a: { subject: 'إحصاء احتمالي', teacher: 'أ. ناصر', room: '501', time: '10:00 - 12:00' }, b: { subject: 'تطوير الويب', teacher: 'أ. هند', room: 'مختبر 2', time: '12:00 - 02:00' }, c: { subject: 'أخلاقيات المهنة', teacher: 'أ. بدر', room: '503', time: '03:00 - 04:30' } },
        { day: 'الخميس', a: { subject: 'برمجة تطبيقات', teacher: 'أ. يوسف', room: 'مختبر 4', time: '09:00 - 11:30' }, b: { subject: 'إدارة مشاريع', teacher: 'أ. أمل', room: '602', time: '12:00 - 01:30' }, c: { subject: 'لغة إنجليزية', teacher: 'أ. خالد', room: '603', time: '03:00 - 05:00' } }
      ]
    };

    const examsData = [
      { subject: 'هياكل البيانات', date: '15 ديسمبر', time: '09:00 ص', location: 'القاعة الكبرى', days: 3 },
      { subject: 'قواعد البيانات', date: '19 ديسمبر', time: '01:00 م', location: 'قاعة ب-205', days: 8 },
      { subject: 'الذكاء الاصطناعي', date: '23 ديسمبر', time: '10:00 ص', location: 'معمل 1', days: 12 }
    ];

    const downloadsData = [
      { name: 'ملخص هياكل البيانات - أسبوع 8', course: 'هياكل البيانات', type: 'PDF', size: '2.4 MB', icon: 'fa-file-pdf', color: 'red' },
      { name: 'مقدمة في الذكاء الاصطناعي', course: 'الذكاء الاصطناعي', type: 'PPTX', size: '5.1 MB', icon: 'fa-file-powerpoint', color: 'blue' },
      { name: 'تمارين قواعد البيانات - واجب 3', course: 'قواعد البيانات', type: 'XLSX', size: '1.2 MB', icon: 'fa-file-excel', color: 'emerald' },
      { name: 'نموذج تسجيل مشروع التخرج', course: 'شؤون الطلاب', type: 'DOCX', size: '850 KB', icon: 'fa-file-word', color: 'purple' }
    ];

    // --- Render Functions ---
    function renderTimetable() {
      const tbody = document.getElementById('timetableBody');
      tbody.innerHTML = '';
      const data = timetableData['cs']; // Mock: always show CS for demo
      
      data.forEach(row => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-slate-800/50 last:border-0';
        
        const dayCell = `<td class="p-2 font-bold text-cyan-400 text-xs sticky right-0 bg-slate-900/80 backdrop-blur-sm">${row.day}</td>`;
        
        const renderCell = (period) => {
          if (!period) {
            return `<td class="p-1"><div class="tt-cell empty rounded-lg h-14 flex items-center justify-center text-[10px]">فارغ</div></td>`;
          }
          return `<td class="p-1">
            <div class="tt-cell filled rounded-lg h-14 p-2 flex flex-col justify-between cursor-pointer">
              <div class="font-bold text-[11px] leading-tight truncate">${period.subject}</div>
              <div class="text-[9px] text-cyan-200/70 flex items-center gap-1">
                <i class="fas fa-user-tie text-[8px]"></i> ${period.teacher}
              </div>
              <div class="text-[9px] text-cyan-200/70 flex items-center gap-1">
                <i class="fas fa-map-marker-alt text-[8px]"></i> ${period.room}
              </div>
            </div>
          </td>`;
        };

        tr.innerHTML = dayCell + renderCell(row.a) + renderCell(row.b) + renderCell(row.c);
        tbody.appendChild(tr);
      });
    }

    function renderExams() {
      const container = document.getElementById('examList');
      container.innerHTML = '';
      examsData.forEach(exam => {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-3 p-2.5 rounded-lg bg-slate-800/40 border border-slate-700/30 hover:bg-slate-700/40 transition cursor-pointer';
        div.innerHTML = `
          <div class="w-1 h-10 rounded-full ${exam.days <= 5 ? 'bg-rose-500' : 'bg-amber-500'}"></div>
          <div class="flex-1 min-w-0">
            <div class="text-[11px] font-bold text-white truncate">${exam.subject}</div>
            <div class="text-[10px] text-slate-400 flex items-center gap-2 mt-0.5">
              <span><i class="far fa-calendar ml-1"></i>${exam.date}</span>
              <span><i class="far fa-clock ml-1"></i>${exam.time}</span>
            </div>
          </div>
          <span class="text-[9px] font-bold px-1.5 py-0.5 rounded ${exam.days <= 5 ? 'bg-rose-500/10 text-rose-400' : 'bg-amber-500/10 text-amber-400'} border border-current opacity-80">
            ${exam.days} أيام
          </span>
        `;
        container.appendChild(div);
      });
    }

    function renderDownloads() {
      const container = document.getElementById('downloadList');
      container.innerHTML = '';
      downloadsData.forEach((file, idx) => {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-3 p-2.5 rounded-lg bg-slate-800/40 border border-slate-700/30 hover:bg-slate-700/40 transition cursor-pointer group';
        div.onclick = () => openModal(file);
        div.innerHTML = `
          <div class="w-8 h-8 rounded-md bg-${file.color}-500/10 text-${file.color}-400 flex items-center justify-center text-sm shrink-0">
            <i class="fas ${file.icon}"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-[11px] font-bold text-slate-200 group-hover:text-cyan-300 transition truncate">${file.name}</div>
            <div class="text-[9px] text-slate-500">${file.course} • ${file.size}</div>
          </div>
          <i class="fas fa-download text-[10px] text-slate-600 group-hover:text-cyan-400 transition"></i>
        `;
        container.appendChild(div);
      });
    }

    // --- Modal & Interactions ---
    function openModal(file) {
      document.getElementById('modalFileName').textContent = file.name;
      document.getElementById('modalCourse').textContent = file.course;
      document.getElementById('modalInstructor').textContent = 'د. أحمد المنصور'; // Mock
      document.getElementById('modalSize').textContent = file.size;
      
      const icon = document.getElementById('modalIcon');
      icon.className = `w-10 h-10 rounded-lg bg-${file.color}-500/10 text-${file.color}-400 flex items-center justify-center text-lg`;
      icon.innerHTML = `<i class="fas ${file.icon}"></i>`;
      
      document.getElementById('fileModal').classList.add('active');
    }

    function openLibraryModal() {
      // For demo, just open the first file or show a toast
      showToast('جاري فتح المكتبة الشاملة...');
    }

    function closeModal() {
      document.getElementById('fileModal').classList.remove('active');
    }

    function simulateDownload() {
      closeModal();
      showToast('تم بدء التحميل بنجاح');
      
      // Actual dummy download trigger
      const blob = new Blob(['محتوى الملف التجريبي'], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = document.getElementById('modalFileName').textContent + '.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
      toast.classList.remove('translate-y-20', 'opacity-0');
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 2500);
    }

    // --- Clock ---
    function updateClock() {
      const now = new Date();
      document.getElementById('liveClock').textContent = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit', hour12: false });
      document.getElementById('liveDate').textContent = now.toLocaleDateString('ar-SA', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    // --- Init ---
    setInterval(updateClock, 1000);
    updateClock();
    renderTimetable();
    renderExams();
    renderDownloads();

    // Department/Semester change mock
    document.getElementById('deptSelect').addEventListener('change', () => {
      showToast('جاري تحميل بيانات القسم الجديد...');
      // In a real app, this would fetch new data
    });
  </script>
</body>
</html>
