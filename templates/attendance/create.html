{% set active_page = 'attendance' %}
{% extends 'base.html' %}
{% block content %}
<div class="user-form-shell">
  <div class="user-form-card">
    <div class="page-title mb-4">
      <div>
        <h2 class="mb-1">إضافة حضور عضو هيئة تدريس</h2>
        <p class="text-muted mb-0">اختر العضو والفترة A أو B أو C بدون إدخال وقت فعلي.</p>
      </div>
    </div>
    <form method="post" class="form-grid">
      <div class="form-group full">
        <label>عضو هيئة التدريس</label>
        <select class="form-control" name="teacher_id" required>
          {% for t in teachers %}
          <option value="{{ t.id }}">{{ t.name }} - {{ t.department }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>التاريخ</label>
        <input type="date" class="form-control" name="date" required>
      </div>
      <div class="form-group">
        <label>الفترة</label>
        <select class="form-control" name="period" required>
          <option value="A">Period A</option>
          <option value="B">Period B</option>
          <option value="C">Period C</option>
        </select>
      </div>
      <div class="form-group">
        <label>الحالة</label>
        <select class="form-control" name="status" required>
          <option value="حاضر">حاضر</option>
          <option value="غائب">غائب</option>
          <option value="متأخر">متأخر</option>
        </select>
      </div>
      <div class="form-group full">
        <label>ملاحظات</label>
        <textarea class="form-control" name="note"></textarea>
      </div>
      <div class="form-actions full">
        <button class="btn btn-success" type="submit">حفظ</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('attendance.list_attendance') }}">إلغاء</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
