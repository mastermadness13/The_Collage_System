<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<div class="modal-success" style="text-align:center;padding:2rem">
  <div style="font-size:3rem;margin-bottom:1rem">✅</div>
  <h3>{{ message }}</h3>

      window.close();
    }
