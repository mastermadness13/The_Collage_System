{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <h2>إدارة الأقسام</h2>
    <button class="btn btn-success mb-3" data-toggle="modal" data-target="#addDepartmentModal">إضافة قسم</button>
    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>#</th>
                <th>اسم القسم</th>
                <th>عدد الفصول</th>
                <th>عدد الاختصاصات</th>
                <th>إجراءات</th>
            </tr>
        </thead>
        <tbody>
            {% for d in departments %}
            <tr>
                <td>{{ d.id }}</td>
                <td>{{ d.name }}</td>
                <td>{{ d.semesters }}</td>
                <td>{{ d.majors }}</td>
                <td>
                    <button class="btn btn-primary btn-sm" data-toggle="modal" data-target="#editDepartmentModal{{d.id}}">تعديل</button>
                    <form method="post" action="{{ url_for('departments.delete_department', id=d.id) }}" style="display:inline;" onsubmit="return confirm('هل أنت متأكد من حذف القسم؟');">
                        <button class="btn btn-danger btn-sm" type="submit">حذف</button>
                    </form>
                </td>
            </tr>

            <div class="modal fade" id="editDepartmentModal{{d.id}}" tabindex="-1" role="dialog" aria-labelledby="editDepartmentLabel{{d.id}}" aria-hidden="true">
              <div class="modal-dialog" role="document">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="editDepartmentLabel{{d.id}}">تعديل القسم</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="إغلاق">
                      <span aria-hidden="true">&times;</span>
                    </button>
                  </div>
                  <form method="post" action="{{ url_for('departments.edit_department', id=d.id) }}">
                    <div class="modal-body">
                        <div class="form-group">
                            <label>اسم القسم</label>
                            <input type="text" class="form-control" name="name" value="{{ d.name }}" required>
                        </div>
                        <div class="form-group">
                            <label>عدد الفصول</label>
                            <input type="number" class="form-control" name="semesters" value="{{ d.semesters }}" min="1" required>
                        </div>
                        <div class="form-group">
                            <label>عدد الاختصاصات</label>
                            <input type="number" class="form-control" name="majors" value="{{ d.majors }}" min="1" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                      <button type="button" class="btn btn-secondary" data-dismiss="modal">إلغاء</button>
                      <button type="submit" class="btn btn-primary">حفظ</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>

            {% endfor %}
        </tbody>
    </table>

    <div class="modal fade" id="addDepartmentModal" tabindex="-1" role="dialog" aria-labelledby="addDepartmentLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addDepartmentLabel">إضافة قسم</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="إغلاق">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <form method="post" action="{{ url_for('departments.create_department') }}">
            <div class="modal-body">
                <div class="form-group">
                    <label>اسم القسم</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="form-group">
                    <label>عدد الفصول</label>
                    <input type="number" class="form-control" name="semesters" min="1" value="2" required>
                </div>
                <div class="form-group">
                    <label>عدد الاختصاصات</label>
                    <input type="number" class="form-control" name="majors" min="1" value="1" required>
                </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-dismiss="modal">إلغاء</button>
              <button type="submit" class="btn btn-primary">حفظ</button>
            </div>
          </form>
        </div>
      </div>
    </div>
</div>
{% endblock %}
